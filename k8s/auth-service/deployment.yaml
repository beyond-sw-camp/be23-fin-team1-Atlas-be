apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: atlas
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/atlas-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: MARIADB_HOST
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mariadb://$(DB_HOST):3306/auth_db
            - name: SPRING_DATASOURCE_USERNAME
              value: atlas
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: MARIADB_PASSWORD
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: REDIS_HOST
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: REDIS_PASSWORD
            - name: SPRING_ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: ELASTICSEARCH_USERNAME
            - name: SPRING_ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: ELASTICSEARCH_PASSWORD
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: ATLAS_REDIS_VERIFICATION_DATABASE
              value: "0"
            - name: ATLAS_REDIS_SESSION_DATABASE
              value: "1"
            - name: JWT_ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: JWT_ACCESS_TOKEN_SECRET
            - name: JWT_REFRESH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: JWT_REFRESH_TOKEN_SECRET
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: MAIL_USERNAME
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: MAIL_PASSWORD
            - name: SPRING_MAIL_HOST
              value: smtp.gmail.com
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
