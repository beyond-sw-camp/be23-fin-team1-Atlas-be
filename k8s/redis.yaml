apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: atlas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: REDIS_PASSWORD
          command:
            - sh
            - -c
            - "redis-server --requirepass $REDIS_PASSWORD"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: atlas
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app: redis