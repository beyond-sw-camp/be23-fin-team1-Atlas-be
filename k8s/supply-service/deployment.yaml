apiVersion: apps/v1
kind: Deployment
metadata:
  name: supply-service
  namespace: atlas
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: supply-service
  template:
    metadata:
      labels:
        app: supply-service
    spec:
      containers:
        - name: supply-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/atlas-supply:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: MARIADB_HOST
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mariadb://$(DB_HOST):3306/supply_db?sslMode=trust
            - name: SPRING_DATASOURCE_USERNAME
              value: atlas
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: MARIADB_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "2"
            - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
              value: "0"
            - name: SPRING_BATCH_JOB_ENABLED
              value: "false"
            - name: MANAGEMENT_HEALTH_ELASTICSEARCH_ENABLED
              value: "false"
            - name: SPRING_ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: ELASTICSEARCH_USERNAME
            - name: SPRING_ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: ELASTICSEARCH_PASSWORD
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka-service:9092
            - name: KAKAO_REST_API_KEY
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: KAKAO_REST_API_KEY
            - name: ATLAS_AUTH_SERVICE_BASE_URL
              value: http://auth-service:8080/
            - name: ATLAS_FILE_SERVICE_BASE_URL
              value: http://file-service:8080/
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 12
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
