apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: atlas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
    spec:
      containers:
        - name: file-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/atlas-file:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: MARIADB_HOST
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mariadb://$(DB_HOST):3306/file_db
            - name: SPRING_DATASOURCE_USERNAME
              value: atlas
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: MARIADB_PASSWORD
            - name: AWS_REGION
              value: ap-northeast-2
            - name: S3_MEDIA_BUCKET
              value: atlas-files
            - name: S3_DOCUMENT_BUCKET
              value: atlas-files
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: AWS_ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: atlas-secrets
                  key: AWS_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
