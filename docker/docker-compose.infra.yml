services:
  mariadb:
    image: mariadb:11.4
    container_name: atlas-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: atlas
      MARIADB_USER: atlas
      MARIADB_PASSWORD: atlas
    ports:
      - "3306:3306"
    volumes:
      - atlas-mariadb-data:/var/lib/mysql
      - ./mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    environment:
      POSTGRES_DB: control_db
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
    ports:
      - "5432:5432"
    volumes:
      - atlas-postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d control_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: atlas-redis
    command: ["redis-server", "--requirepass", "atlas"]
    ports:
      - "6379:6379"
    volumes:
      - atlas-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "atlas", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    container_name: atlas-kafka
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: SASL_PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: SASL_PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CFG_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_CFG_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_INTER_BROKER_USER: atlas
      KAFKA_INTER_BROKER_PASSWORD: atlas
      KAFKA_CLIENT_USERS: atlas
      KAFKA_CLIENT_PASSWORDS: atlas
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - atlas-kafka-data:/bitnami/kafka
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics.sh --bootstrap-server localhost:9092 --command-config /opt/bitnami/kafka/config/producer.properties --list >/dev/null 2>&1"
        ]
      interval: 15s
      timeout: 10s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: atlas-elasticsearch
    environment:
      discovery.type: single-node
      ELASTIC_PASSWORD: atlas
      xpack.security.enabled: "true"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - atlas-elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsu elastic:atlas http://localhost:9200/_cluster/health >/dev/null"
        ]
      interval: 15s
      timeout: 10s
      retries: 20

volumes:
  atlas-mariadb-data:
  atlas-postgres-data:
  atlas-redis-data:
  atlas-kafka-data:
  atlas-elasticsearch-data:
