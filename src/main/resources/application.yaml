spring:
  application:
    name: atlas
  profiles:
    default: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  batch:
    job:
      enabled: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
