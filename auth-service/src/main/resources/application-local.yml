spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mariadb://localhost:3306/auth_db
    username: atlas
    password: atlas
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8081

jwt:
  access-token-secret: ${JWT_ACCESS_TOKEN_SECRET:local-access-token-secret-change-me}
  refresh-token-secret: ${JWT_REFRESH_TOKEN_SECRET:local-refresh-token-secret-change-me}
