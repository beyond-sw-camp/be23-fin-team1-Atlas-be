spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD}
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://elasticsearch-service:9200}
    username: ${SPRING_ELASTICSEARCH_USERNAME}
    password: ${SPRING_ELASTICSEARCH_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  mail:
    # 메일 서버 주소입니다.
    host: ${SPRING_MAIL_HOST}
    # 메일 서버 포트입니다.
    port: ${SPRING_MAIL_PORT:587}
    # 메일 로그인 아이디입니다.
    username: ${SPRING_MAIL_USERNAME}
    # 메일 로그인 비밀번호입니다.
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          # SMTP 인증을 켭니다.
          auth: true
          starttls:
            # TLS 암호화를 켭니다.
            enable: true

atlas:
  mail:
    # 발신자 주소입니다.
    from: ${ATLAS_MAIL_FROM:${SPRING_MAIL_USERNAME}}
  redis:
    verification:
      database: ${ATLAS_REDIS_VERIFICATION_DATABASE:0}
    session:
      database: ${ATLAS_REDIS_SESSION_DATABASE:1}

server:
  port: 8080

jwt:
  access-token-secret: ${JWT_ACCESS_TOKEN_SECRET}
  refresh-token-secret: ${JWT_REFRESH_TOKEN_SECRET}
  access-token-expiration-ms: 3600000
  refresh-token-expiration-ms: 1209600000
