spring:
  config:
    activate:
      on-profile: local
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: supply-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/supply/**
        - id: control-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/control/**
        - id: file-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/files/**

server:
  port: 8080

jwt:
  access-token-secret: ${JWT_ACCESS_TOKEN_SECRET:local-access-token-secret-change-me}
