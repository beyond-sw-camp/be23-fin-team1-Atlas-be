spring:
  profiles:
    active: local
  application:
    name: api-gateway

springdoc:
  api-docs:
    path: /api/gateway/v3/api-docs
  swagger-ui:
    path: /api/gateway/swagger-ui.html
    url: /api/gateway/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
