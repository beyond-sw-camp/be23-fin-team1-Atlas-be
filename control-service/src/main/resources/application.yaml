spring:
  profiles:
    active: prod
  application:
    name: control-service

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api/control/v3/api-docs
  swagger-ui:
    path: /api/control/swagger-ui.html
    url: /api/control/v3/api-docs
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha
